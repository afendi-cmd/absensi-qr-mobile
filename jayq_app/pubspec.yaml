name: jayq_app
description: "JAYQ - Modern Attendance App with QR Code"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0

  # State Management
  provider: ^6.1.1

  # Network & API
  http: ^1.2.0
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # QR Code
  mobile_scanner: ^3.5.5
  qr_flutter: ^4.1.0

  # File & Image
  image_picker: ^1.0.7
  file_picker: ^8.0.0+1

  # Utils
  intl: ^0.19.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.3.10
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/

# Native Splash Screen Configuration (Background only)
flutter_native_splash:
  color: "#F8F9FB"
  color_dark: "#F8F9FB"

  android_12:
    color: "#F8F9FB"
    icon_background_color: "#F8F9FB"

  android: true
  ios: true
  web: false

  fullscreen: true

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/image.png"
  adaptive_icon_background: "#F8F9FB"
  adaptive_icon_foreground: "assets/logo/image.png"
  remove_alpha_ios: true
